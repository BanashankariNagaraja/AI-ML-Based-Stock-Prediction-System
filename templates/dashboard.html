<!-- templates/dashboard.html -->

{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1 class="mb-4">
        User Dashboard
    </h1>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card dashboard-card shadow">

                <div class="card-body text-center">

                    <i class="fa-solid fa-chart-line dashboard-icon"></i>

                    <h5 class="mt-3">Realtime Stocks</h5>

                    <a href="/realtime"
                    class="btn btn-dark mt-2">
                        Open
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow">

                <div class="card-body text-center">

                    <i class="fa-solid fa-brain dashboard-icon"></i>

                    <h5 class="mt-3">Prediction</h5>

                    <a href="/predict"
                    class="btn btn-primary mt-2">
                        Open
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow">

                <div class="card-body text-center">

                    <i class="fa-solid fa-user dashboard-icon"></i>

                    <h5 class="mt-3">Profile</h5>

                    <a href="/profile"
                    class="btn btn-success mt-2">
                        Open
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow">

                <div class="card-body text-center">

                    <i class="fa-solid fa-book dashboard-icon"></i>

                    <h5 class="mt-3">Education</h5>

                    <a href="/education"
                    class="btn btn-warning mt-2">
                        Open
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
