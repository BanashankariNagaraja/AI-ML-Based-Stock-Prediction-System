{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5 d-flex justify-content-center">

    <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 600px;">

        <h1 class="text-center fw-bold mb-4">
            Contact 
        </h1>

        <form method="POST">

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Full Name
                </label>

                <input type="text"
                name="name"
                class="form-control"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Email Address
                </label>

                <input type="email"
                name="email"
                class="form-control"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Subject
                </label>

                <input type="text"
                name="subject"
                class="form-control"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Message
                </label>

                <textarea name="message"
                rows="6"
                class="form-control"
                required></textarea>

            </div>

            <button class="btn btn-primary btn-lg w-100">
                Send Message
            </button>

        </form>

    </div>

</div>

{% endblock %}
