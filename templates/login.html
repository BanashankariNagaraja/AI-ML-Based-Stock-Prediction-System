<!-- templates/login.html -->

{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center"
    style="min-height:80vh;">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg border-0 p-5">

                <!-- TITLE -->

                <div class="text-center mb-4">


                    <h1 class="fw-bold">

                        Login

                    </h1>

                    <p class="text-muted">

                        Access your stock prediction dashboard

                    </p>

                </div>

                <!-- FORM -->

                <form method="POST">

                    <!-- EMAIL -->

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Email Address

                        </label>

                        <input type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Password

                        </label>

                        <input type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                    </div>

                    <!-- BUTTON -->

                    <button type="submit"
                    class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <!-- REGISTER LINK -->

                <div class="text-center mt-4">

                    <p class="text-muted mb-0">

                        Don’t have an account?

                        <a href="/register"
                        class="text-info text-decoration-none fw-semibold">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
