<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Charts</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background-color:#f5f5f5;
        }

        .navbar{
            background-color:#212529;
        }

        .card{
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            border:none;
        }

        .chart-container{
            width:100%;
            height:400px;
        }

        h2{
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            Stock Market Prediction
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/charts">Charts</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/prediction">Prediction</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Main Container -->

<div class="container mt-5">

    <div class="row">

        <!-- Closing Price Chart -->

        <div class="col-md-12 mb-5">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    Closing Price Chart
                </h2>

                <div class="chart-container">
                    <canvas id="closingChart"></canvas>
                </div>

            </div>

        </div>

        <!-- Accuracy Comparison Chart -->

        <div class="col-md-6">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    Accuracy Comparison
                </h2>

                <div class="chart-container">
                    <canvas id="accuracyChart"></canvas>
                </div>

            </div>

        </div>

        <!-- Model Evaluation Chart -->

        <div class="col-md-6">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    Model Evaluation
                </h2>

                <div class="chart-container">
                    <canvas id="evaluationChart"></canvas>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Closing Price Chart -->

<script>

const closingCtx = document.getElementById('closingChart');

new Chart(closingCtx, {

    type: 'line',

    data: {

        labels: [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul'
        ],

        datasets: [{

            label: 'Closing Price',

            data: [120, 140, 135, 160, 180, 170, 200],

            borderColor: 'blue',

            backgroundColor: 'rgba(0,0,255,0.1)',

            fill: true,

            tension: 0.4,

            borderWidth: 3

        }]
    },

    options: {

        responsive: true,

        plugins: {

            legend: {
                display: true
            }

        }

    }

});

</script>

<!-- Accuracy Chart -->

<script>

const accuracyCtx = document.getElementById('accuracyChart');

new Chart(accuracyCtx, {

    type: 'bar',

    data: {

        labels: [
            'Linear Regression',
            'Random Forest',
            'Decision Tree',
            'KNN'
        ],

        datasets: [{

            label: 'Accuracy %',

            data: [82, 94, 88, 85],

            backgroundColor: [
                '#0d6efd',
                '#198754',
                '#ffc107',
                '#dc3545'
            ],

            borderWidth: 1

        }]
    },

    options: {

        responsive: true,

        scales: {

            y: {

                beginAtZero: true,

                max: 100

            }

        }

    }

});

</script>

<!-- Model Evaluation Chart -->

<script>

const evaluationCtx = document.getElementById('evaluationChart');

new Chart(evaluationCtx, {

    type: 'pie',

    data: {

        labels: [
            'Linear Regression',
            'Random Forest',
            'Decision Tree',
            'KNN'
        ],

        datasets: [{

            data: [20, 45, 20, 15],

            backgroundColor: [
                '#0d6efd',
                '#198754',
                '#ffc107',
                '#dc3545'
            ]

        }]
    },

    options: {

        responsive: true

    }

});

</script>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
