{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="card shadow-lg border-0 p-5">

        <h1 class="fw-bold mb-5">
            User Messages
        </h1>

        <div class="table-responsive">

            <table class="table table-bordered table-hover bg-white">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Message</th>

                    </tr>

                </thead>

               <tbody>

    {% for msg in messages %}

    <tr>

        <td>{{ msg.id }}</td>

        <td>{{ msg.name }}</td>

        <td>{{ msg.email }}</td>

        <td>{{ msg.subject }}</td>

        <td>{{ msg.message }}</td>

    </tr>

    {% endfor %}

</tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
